# Setup
title: August Neuscheler
tagline: ''
description: ''
url: 'https://aneuscheler.info'
baseurl: ''

# About/contact
author: 
  name: 'Aidan Quinlan'
  url: 'aidanquinlan.net'
  email: ''

# Permalinks
permalink: pretty
permalink: /:title/

# Set encoding to UTF-8
encoding: utf-8

# Markdown specs
markdown: kramdown

kramdown:
  auto_ids:       true
  footnote_nr:    1
  entity_output:  as_char
  footnote_backlink: "&#x21a9;&#xfe0e;"
  toc_levels:     1..6
  smart_quotes:   lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Exclusions from the final site
exclude:
  - optional
  - vendor
  - ed..gemspec
  - Gemfile
  - Gemfile.lock
  - backstop_data
  - backstop.json

remote_theme: minicomp/ed