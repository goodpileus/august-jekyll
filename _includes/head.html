<head prefix="og: http://ogp.me/ns#; dc: http://purl.org/dc/terms/#">
  {% capture resource_url %}{{ site.url }}{{ site.baseurl }}{{ page.url }}{% endcapture %}
  {% capture directory_url %}{{ site.url }}{{ site.baseurl }}{% endcapture %}
  <link rel="canonical" href="{{ site.url }}" />

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width,initial-scale=1.0,shrink-to-fit=no" />

  <title>
    {{ site.title }}
  </title>

  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:url" content="{{ site.url }}" />
  <meta property="og:image" content="{{ site.url }}/assets/img/og2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css" />

  <link rel="shortcut icon" href="{{ site.baseurl }}/assets/favicon.png" />
</head>
